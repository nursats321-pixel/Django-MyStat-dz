<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
</head>
<body style="font-family: sans-serif; background: #111; color: #fff; padding: 50px; text-align: center;">


    <div style="max-width: 350px; margin: 0 auto; background: #222; padding: 30px; border-radius: 8px;">
        <h2>🔑 Авторизация</h2>
        
        {% if error %}
            <p style="color: #ff5555; font-weight: bold;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %} <div style="margin-bottom: 15px;">
                <input type="text" name="username" placeholder="Имя пользователя (Логин)" required 
                    style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <input type="password" name="password" placeholder="Пароль" required 
                    style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 10px; background: #55ff55; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Войти в систему
            </button>
        </form>
    </div>

</body>
</html>
