<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Наша доска</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            padding: 20px
        }

        .post {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }   

        h1 {
            color: #333;
        }

        .author {
            color: #007bff;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <h1> Лента сообщений группы</h1> <a href="/team/" class="btn">Посмотреть нашу команду</a>

    {% for post in posts %}
    <div class="post">
        <h3>{{ post.title }}</h3>
        <p>{{ post.text}}</p>
        <p class="author">Автор: {{ post.author }}</p>
    </div> {% endfor %}

    {% for member in team%}
    <div class="teams">
        <h3>{{ member.name }}</h3>
        <p>{{ member.role}}</p>
    </div> {% endfor %}
</body>

</html>
